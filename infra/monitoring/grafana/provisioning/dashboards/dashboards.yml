# ===========================================
# Grafana Dashboard Provisioning
# ===========================================
# Auto-load dashboard JSON files

apiVersion: 1

providers:
  - name: 'Sonoro Dashboards'
    orgId: 1
    folder: 'Sonoro'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
