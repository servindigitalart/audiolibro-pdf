[pytest]
asyncio_mode = auto
testpaths = tests

markers =
    unit: pure-logic tests — no DB, no HTTP client, no external services
    integration: full request/response tests against the test database
    performance: load and stress tests — run explicitly with: pytest tests/performance/ -m performance -s
    chaos: financial resilience and fault-injection tests — run explicitly with: pytest tests/chaos/ -m chaos -s
    stripe: Stripe integration tests — run explicitly with: pytest tests/test_stripe/ -m stripe -s
    pricing: Pricing and monetization engine tests — run explicitly with: pytest tests/test_pricing/ -m pricing -s

# Short tracebacks keep output readable; -q suppresses per-test dots
# Performance, chaos, stripe, and pricing tests are excluded from the default run.
# Run them explicitly:
#   pytest tests/performance/ -m performance -s --tb=short
#   pytest tests/chaos/ -m chaos -s --tb=short
#   pytest tests/test_stripe/ -m stripe -s --tb=short
#   pytest tests/test_pricing/ -m pricing -s --tb=short
addopts =
    --tb=short
    -q
    --ignore=tests/performance
    --ignore=tests/chaos
    --ignore=tests/test_stripe
    --ignore=tests/test_pricing
