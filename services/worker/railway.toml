[build]
builder = "nixpacks"
# The worker shares the API codebase. Point Railway's root directory to
# services/api/ (configured in the Railway dashboard, not here), so that
# app.celery_app resolves correctly.

[deploy]
# Run from services/api/ root — Railway dashboard: Root Directory = services/api
startCommand = "celery -A app.celery_app worker --loglevel=info"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
