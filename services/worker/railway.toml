[build]
builder = "nixpacks"
# The worker shares the API codebase.
# Railway dashboard: set Root Directory = services/api for this service
# so that "app.*" imports resolve correctly.

[deploy]
# start.sh exports PYTHONPATH before launching Celery, preventing the
# ModuleNotFoundError: No module named 'app' that bare celery commands hit.
startCommand = "bash start.sh"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
