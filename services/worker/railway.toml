[build]
builder = "nixpacks"

# The worker shares the API codebase.
# Railway dashboard:
#   Root Directory = services/api
#   Custom Start Command = bash start-worker.sh
#
# We intentionally DO NOT define startCommand here,
# because the API and Worker use different commands.

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3